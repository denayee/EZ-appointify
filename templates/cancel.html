{% extends "authority_layout.html" %}

{% block title %}
    Cancle
{% endblock %}

{% block main %}
<br>
<div class='parent'>
<div id="child3">
<h3><u>Cancel by Date</u></h3>
<br>
    <form action="/cancel" method="post">
        <div class="form-group">
            <label for="date"> Date:</label>
            <input type="date" id="date" name="date_only" min="today" required>
          </div>

          <button type="submit">Cancel</button>
    </form>
</div>
<div  id="child4">
<h3><u>Cancel by Date and Time</u></h3>
<br>
    <form action="/cancel" method="post">
        <div class="form-group">
            <label for="date"> Date:</label>
            <input type="date" id="date" name="date" min="today" required>
        </div>

        <div class="form-group">
            <label for="time">Select a time </label>
            <select id="section_time"name="time" required>
             <option>10:00 AM</option>
             <option>10:30 AM</option>
             <option>11:00 AM</option>
             <option>11:30 AM</option>
             <option>12:00 PM</option>
             <option>12:30 PM</option>
             <option>02:00 PM</option>
             <option>02:30 PM</option>
             <option>03:00 PM</option>
             <option>03:30 PM</option>
             <option>04:00 PM</option>
             <option>04:30 PM</option>
             <option>05:00 PM</option>
           </select>
         </div>

         <button type="submit">Cancel</button>
        </div>
    </div>
    </div>
    </form>
    <br>
{% endblock %}
