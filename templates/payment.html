{% extends "layout.html" %}

{% block title %}
    Payment
{% endblock %}

{% block main %}
<br>
<center>
  <div class="container4">
    <h2><U>Card Payment</U></h2>
    <br>
    <form action="/payment" method="post">
      <div class="form-group">
        <label for="card-number">Card Number :</label>
        <input type="text" 
        
        inputmode="numeric"
        pattern="[0-9\s]{16}"
        autocomplete="cc-number"
        maxlength="16"
        placeholder="xxxx xxxx xxxx xxxx"
       id="card-number" placeholder="Card number" required>
      </div>
      <div class="form-group">
        <label for="card-holder">Card Holder Name :</label>
        <input type="text" id="card-holder" pattern="[A-Za-z]+"  placeholder="Card holder's name" required>
      </div>
      <div class="form-row">
        <div class="form-group form-column">
          <label for="expiry-date">Expiry Date :</label>
          <input  pattern="\d{1,2}/\d{4}" type="text" id="expiry-date" placeholder="MM/YYYY" required>
        </div>
        <div class="form-group form-column">
          <label for="cvv">CVV :</label>
          <input pattern="[0-9\s]{3}" maxlength="3" type="text" id="cvv" placeholder="CVV" required>
        </div>
      </div>
      <!-- <button onclick="myFunction()">Try it</button> -->



      <button  type="submit" class="click-button" onclick="myFunction()">Pay ₹30.00 only    </button>
    </form>
  </div>
</center>
<br>
  {% endblock %}
