{% extends "layout.html" %}

{% block title %}
    feedback
{% endblock %}
    
{% block main %}
<br>
<center>
<section class="contact" id="contact">
          <h2 class="heading"><u>Customer Satisfaction Surveys</u></h2>
          <br>
          <form action="/feedback" method="post">
              <div class="input-box">
                  <div class="input-field">
                      <input type="text" name="nameR" placeholder="Full Name" required>
                      <!-- <span class="focus"></span> -->
                  </div>

                  <div class="input-field">
                      <input pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$" type="text" name="mailR" placeholder="Email Address" required>
                      <!-- <span class="focus"></span> -->
                  </div>
              </div>
              <!-- <div class="input-box">
                  <div class="input-field">
                      <input type="number" placeholder="Mobile Number" required>
                      <span class="focus"></span>
                  </div> -->

                  <!-- <div class="input-field">
                      <input type="text" placeholder="Email Subject" required>
                      <span class="focus"></span>
                  </div>
              </div> -->
              
              <div class="textarea-field">
                  <textarea name="dataR" id="" cols="30" rows="10" placeholder="Your Message" required></textarea>
                  <!-- <span class="focus"></span> -->
              </div>
              <div class="btn-box btns">
                  <button type="submit" class="btn">Submit</button> 
              </div>
          </form>
      </section>

    </center>

 

{% endblock %}
